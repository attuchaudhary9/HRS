services:
  - type: web
    name: hms-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: hms-db
    databaseName: hms
    user: hms_user
